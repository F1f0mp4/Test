<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; font-family: Arial; background: #f0f0f0; }
        .window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            background: white;
            border: 2px solid #333;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            padding: 20px;
            z-index: 9999;
            max-height: 80vh;
            overflow-y: auto;
        }
        h2 { margin-top: 0; }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            resize: vertical;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        button:hover { background: #45a049; }
        #response {
            margin-top: 15px;
            padding: 10px;
            background: #f9f9f9;
            border-left: 4px solid #4CAF50;
            border-radius: 4px;
            min-height: 50px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .loading { color: #999; }
    </style>
</head>
<body>
    <div class="window">
        <h2>🤖 AI Asistent</h2>
        <textarea id="input" placeholder="Napíš otázku alebo zadanie..."></textarea>
        <button onclick="askAI()">Spustiť AI 🚀</button>
        <div id="response"></div>
    </div>

    <script>
        async function askAI() {
            const userText = document.getElementById('input').value;
            const responseDiv = document.getElementById('response');
            
            if (!userText.trim()) {
                alert('Napíš niečo!');
                return;
            }
            
            responseDiv.innerHTML = '<span class="loading">Čakám na AI...</span>';
            
            try {
                const response = await fetch(
                    'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=AIzaSyBp0kEWem8XZpB_OckG6eQc0F7DZ_rMx6I',
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: userText
                                }]
                            }]
                        })
                    }
                );
                
                const data = await response.json();
                const answer = data.candidates[0].content.parts[0].text;
                responseDiv.innerHTML = answer;
                
            } catch (error) {
                responseDiv.innerHTML = '❌ Chyba: ' + error.message;
            }
        }
    </script>
</body>
</html>
